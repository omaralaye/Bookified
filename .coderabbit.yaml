# CodeRabbit Configuration

# Code Quality Rules
quality:
  rules:
    - name: Consistent Indentation
      level: error
      message: Use 2 spaces for indentation.
    - name: No Console Logs
      level: warning
      message: Remove console.log statements before committing.

# Ignored Paths
ignored:
  - node_modules/
  - dist/
  - build/

# Language-Specific Configurations
languages:
  javascript:
    rules:
      - name: No Unused Variables
        level: error
        message: Remove unused variables.
  python:
    rules:
      - name: PEP 8 Compliance
        level: error
        message: Follow PEP 8 style guide.

# Review Scope Settings
review:
  scope:
    - main
    - feature/*
    - bugfix/*
